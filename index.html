<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>YTDL</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #000; --s1: #0d0d0d; --s2: #161616; --s3: #222; --border: #2a2a2a;
  --accent: #FF3B1F; --accent-dim: rgba(255,59,31,0.1);
  --text: #f2f2f2; --muted: #555; --muted2: #888;
  --green: #00e676; --yellow: #ffab40;
  --syne: 'Syne', sans-serif; --mono: 'Space Mono', monospace;
  --safe-b: env(safe-area-inset-bottom, 0px); --safe-t: env(safe-area-inset-top, 0px);
}
html, body { background: var(--bg); color: var(--text); font-family: var(--syne); min-height: 100dvh; overflow-x: hidden; }
.shell { display: flex; flex-direction: column; min-height: 100dvh; padding-top: var(--safe-t); }

/* NAV */
.nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 12px;
  background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 20;
}
.logo { font-family: var(--syne); font-weight: 800; font-size: 19px; letter-spacing: -0.3px; }
.logo em { color: var(--accent); font-style: normal; }
.status-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--s2); border: 1px solid var(--border); border-radius: 20px;
  padding: 5px 11px; font-family: var(--mono); font-size: 9px; color: var(--muted2); letter-spacing: 0.5px;
}
.dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.dot.ok { background: var(--green); box-shadow: 0 0 5px var(--green); animation: blink 2.5s ease-in-out infinite; }
.dot.err { background: var(--accent); }
.dot.loading { background: var(--yellow); animation: blink 0.8s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

/* BODY */
.scroll-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(110px + var(--safe-b)); }

/* INTRO */
.intro { padding: 28px 18px 0; animation: up 0.5s ease both; }
.intro-big { font-size: clamp(38px,12vw,56px); font-weight: 800; line-height: 1; letter-spacing: -1px; margin-bottom: 8px; }
.intro-big em { color: var(--accent); font-style: normal; }
.intro-sub { font-family: var(--mono); font-size: 11px; color: var(--muted2); line-height: 1.6; }

/* URL ZONE */
.url-zone { padding: 22px 16px 0; }
.section-label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 9px; }
.input-wrap {
  background: var(--s2); border: 1.5px solid var(--border); border-radius: 13px;
  display: flex; align-items: center; overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s;
}
.input-wrap.focused { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,59,31,0.08); }
.url-input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-family: var(--mono); font-size: 13px; padding: 15px 14px; line-height: 1.4;
}
.url-input::placeholder { color: var(--muted); }
.clear-btn {
  background: var(--s3); border: none; color: var(--muted2);
  width: 30px; height: 30px; border-radius: 50%; font-size: 13px;
  display: none; align-items: center; justify-content: center; cursor: pointer; margin-right: 10px; flex-shrink: 0;
}
.url-input:not(:placeholder-shown) + .clear-btn { display: flex; }

/* OPTIONS */
.options-wrap { padding: 18px 16px 0; display: flex; flex-direction: column; gap: 14px; }
.chip-row { display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.chip-row::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; background: var(--s2); border: 1.5px solid var(--border);
  border-radius: 30px; padding: 9px 16px; cursor: pointer;
  font-family: var(--syne); font-weight: 600; font-size: 12px; color: var(--muted2);
  white-space: nowrap; transition: all 0.15s;
}
.chip:active { transform: scale(0.94); }
.chip.sel { border-color: var(--accent); background: var(--accent-dim); color: var(--text); }

/* TOASTS */
.toast { margin: 14px 16px 0; border-radius: 11px; padding: 11px 14px; font-family: var(--mono); font-size: 11px; line-height: 1.5; display: none; }
.toast.err { background: rgba(255,59,31,0.09); border: 1px solid rgba(255,59,31,0.25); color: #ff7055; }
.toast.ok  { background: rgba(0,230,118,0.07); border: 1px solid rgba(0,230,118,0.2); color: var(--green); }

/* PROGRESS */
.prog-card {
  margin: 14px 16px 0; background: var(--s1); border: 1px solid var(--border);
  border-radius: 16px; padding: 18px; display: none; animation: up 0.3s ease both;
}
.prog-card.show { display: block; }
.prog-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 13px; }
.prog-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted2); }
.prog-label.active { color: var(--accent); }
.prog-label.done { color: var(--green); }
.prog-pct { font-family: var(--syne); font-weight: 800; font-size: 30px; line-height: 1; }
.prog-track { height: 3px; background: var(--s3); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
.prog-fill.done { background: var(--green); }

/* HISTORY */
.history { padding: 22px 16px 0; display: none; }
.history.show { display: block; }
.hist-head { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 11px; }
.h-item {
  display: flex; align-items: center; gap: 11px;
  background: var(--s1); border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 13px; margin-bottom: 7px;
}
.h-icon { width: 32px; height: 32px; background: var(--accent-dim); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 15px; flex-shrink: 0; }
.h-body { flex: 1; min-width: 0; }
.h-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.h-meta { font-family: var(--mono); font-size: 9px; color: var(--muted2); }

/* BOTTOM BAR */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 10px 16px calc(10px + var(--safe-b));
  background: rgba(0,0,0,0.97); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
  border-top: 1px solid var(--border); z-index: 50;
}
.dl-btn {
  width: 100%; background: var(--accent); border: none; color: #fff;
  font-family: var(--syne); font-weight: 800; font-size: 15px; letter-spacing: 1px;
  padding: 17px; border-radius: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px; transition: opacity 0.15s;
}
.dl-btn:active { opacity: 0.85; transform: scale(0.99); }
.dl-btn:disabled { background: var(--s2); color: var(--muted); }

.spin { width: 17px; height: 17px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: rotate 0.6s linear infinite; flex-shrink: 0; }

@keyframes up { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
@keyframes rotate { to{transform:rotate(360deg)} }

body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.018) 2px,rgba(0,0,0,0.018) 4px);
}
</style>
</head>
<body>
<div class="shell">
  <nav class="nav">
    <div class="logo">YT<em>●</em>DL</div>
    <div class="status-pill">
      <div class="dot loading" id="dot"></div>
      <span id="statusLabel">connecting...</span>
    </div>
  </nav>

  <div class="scroll-body">
    <div class="intro">
      <div class="intro-big">Save<br><em>Any</em><br>Video.</div>
      <div class="intro-sub">No app. No server.<br>Paste link → download.</div>
    </div>

    <div class="url-zone">
      <div class="section-label">YouTube URL</div>
      <div class="input-wrap" id="inputWrap">
        <input type="url" class="url-input" id="urlInput"
          placeholder="youtube.com/watch?v=..."
          autocomplete="off" autocorrect="off" autocapitalize="none"
          spellcheck="false" inputmode="url"/>
        <button class="clear-btn" onclick="clearUrl()">✕</button>
      </div>
    </div>

    <div class="options-wrap">
      <div>
        <div class="section-label">Quality</div>
        <div class="chip-row" id="qualityChips"></div>
      </div>
      <div>
        <div class="section-label">Mode</div>
        <div class="chip-row" id="modeChips"></div>
      </div>
    </div>

    <div class="toast err" id="errToast"></div>
    <div class="toast ok"  id="okToast"></div>

    <div class="prog-card" id="progCard">
      <div class="prog-top">
        <div class="prog-label active" id="progLabel">Connecting</div>
        <div class="prog-pct" id="progPct">—</div>
      </div>
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>

    <div class="history" id="historySection">
      <div class="hist-head">Downloaded</div>
      <div id="histList"></div>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="dl-btn" id="dlBtn" onclick="startDownload()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      DOWNLOAD
    </button>
  </div>
</div>

<script>
const API = 'https://cobalt-api-production-add4.up.railway.app';

const QUALITIES = ['2160','1440','1080','720','480','360'];
const MODES = [
  {label:'Video + Audio', val:'auto'},
  {label:'Audio Only',    val:'audio'},
  {label:'Video Muted',   val:'mute'},
];

let quality = localStorage.getItem('q') || '1080';
let mode    = localStorage.getItem('m') || 'auto';
let history = JSON.parse(localStorage.getItem('h') || '[]');

// Build chips
function buildChips() {
  document.getElementById('qualityChips').innerHTML =
    QUALITIES.map(q => `<button class="chip${q===quality?' sel':''}" onclick="pickQ('${q}')">${q}p</button>`).join('');
  document.getElementById('modeChips').innerHTML =
    MODES.map(m => `<button class="chip${m.val===mode?' sel':''}" onclick="pickM('${m.val}')">${m.label}</button>`).join('');
}
function pickQ(v){ quality=v; localStorage.setItem('q',v); document.querySelectorAll('#qualityChips .chip').forEach(c=>c.classList.toggle('sel',c.textContent===v+'p')); if(navigator.vibrate)navigator.vibrate(20); }
function pickM(v){ mode=v; localStorage.setItem('m',v); document.querySelectorAll('#modeChips .chip').forEach(c=>c.classList.toggle('sel',c.onclick?.toString().includes(`'${v}'`))); buildChips(); if(navigator.vibrate)navigator.vibrate(20); }

// Status
function setStatus(state, label) {
  document.getElementById('dot').className = 'dot ' + state;
  document.getElementById('statusLabel').textContent = label;
}

// Input
const inp = document.getElementById('urlInput');
inp.addEventListener('focus',  () => document.getElementById('inputWrap').classList.add('focused'));
inp.addEventListener('blur',   () => document.getElementById('inputWrap').classList.remove('focused'));
inp.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();startDownload();} });
function clearUrl(){ inp.value=''; inp.focus(); hideToasts(); hideProg(); }

// Toasts
function hideToasts(){ document.getElementById('errToast').style.display='none'; document.getElementById('okToast').style.display='none'; }
function showErr(m){ const t=document.getElementById('errToast'); t.textContent='⚠ '+m; t.style.display='block'; }
function showOk(m) { const t=document.getElementById('okToast');  t.textContent='✓ '+m; t.style.display='block'; }

// Progress
function showProg(label, pct, done=false){
  document.getElementById('progCard').classList.add('show');
  const l=document.getElementById('progLabel'); l.textContent=label; l.className='prog-label '+(done?'done':'active');
  document.getElementById('progPct').textContent=pct+'%';
  const f=document.getElementById('progFill'); f.style.width=pct+'%'; f.className='prog-fill'+(done?' done':'');
}
function hideProg(){ document.getElementById('progCard').classList.remove('show'); }

// Busy state
const DL_ICON = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
function setBusy(v){
  const b=document.getElementById('dlBtn');
  b.disabled=v;
  b.innerHTML = v ? '<span class="spin"></span>' : DL_ICON+' DOWNLOAD';
}

// Download
async function startDownload(){
  const url = inp.value.trim();
  if(!url){ showErr('Paste a YouTube URL first.'); return; }
  hideToasts(); hideProg(); setBusy(true);
  showProg('Sending request...', 20);

  try {
    const body = {
      url,
      videoQuality: quality,
      downloadMode: mode,
      audioFormat: 'mp3',
      audioBitrate: '128',
      filenameStyle: 'pretty',
    };

    const res = await fetch(API+'/', {
      method: 'POST',
      headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: AbortSignal.timeout(25000)
    });

    showProg('Processing...', 60);
    if(!res.ok) throw new Error(`Server responded with ${res.status}`);
    const data = await res.json();

    if(data.status === 'error'){
      throw new Error(data.error?.code || 'Download error');
    }

    if(data.status === 'redirect' || data.status === 'tunnel'){
      showProg('Opening download...', 90);
      const a = document.createElement('a');
      a.href = data.url; a.download = data.filename||'video'; a.target='_blank'; a.rel='noopener';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(()=>{
        showProg('Done!', 100, true);
        setBusy(false);
        if(navigator.vibrate) navigator.vibrate([50,30,80]);
        addHistory(data.filename||'video.mp4', mode==='audio'?'MP3':quality+'p');
        setTimeout(hideProg, 3000);
      }, 600);
    } else if(data.status === 'picker'){
      hideProg(); setBusy(false);
      showErr('Multiple items found. Open cobalt.tools directly for this link.');
    } else {
      throw new Error('Unexpected response: '+data.status);
    }
  } catch(e){
    hideProg(); setBusy(false);
    if(e.name==='TimeoutError') showErr('Request timed out. Check your connection.');
    else showErr(e.message||'Download failed.');
  }
}

// History
function addHistory(filename, q){
  history.unshift({ name: filename.replace(/\.[^.]+$/,''), q, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
  if(history.length>8) history.pop();
  localStorage.setItem('h', JSON.stringify(history));
  renderHistory();
}
function renderHistory(){
  if(!history.length) return;
  document.getElementById('historySection').classList.add('show');
  document.getElementById('histList').innerHTML = history.slice(0,5).map(h=>`
    <div class="h-item">
      <div class="h-icon">↓</div>
      <div class="h-body">
        <div class="h-title">${h.name}</div>
        <div class="h-meta">${h.q} · ${h.time}</div>
      </div>
    </div>`).join('');
}

// Init
buildChips();
renderHistory();
(async()=>{
  try {
    const r = await fetch(API+'/', { headers:{'Accept':'application/json'}, signal: AbortSignal.timeout(6000) });
    const d = await r.json();
    if(d.cobalt) setStatus('ok','railway ✓');
    else setStatus('err','api error');
  } catch { setStatus('err','offline'); }
})();
</script>
</body>
</html>
